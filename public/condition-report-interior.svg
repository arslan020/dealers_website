<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1153 718" width="1153" height="718">
  <rect width="1153" height="718" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="576" y="38" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#374151">Vehicle Interior  Top View</text>

  <!-- Main car body outline -->
  <rect x="160" y="60" width="830" height="600" rx="40" ry="40" fill="#e5e7eb" stroke="#374151" stroke-width="3"/>

  <!-- Windscreen top -->
  <rect x="200" y="60" width="750" height="12" rx="4" fill="#bfdbfe" stroke="#93c5fd" stroke-width="1.5"/>
  <!-- Windscreen bottom -->
  <rect x="200" y="645" width="750" height="12" rx="4" fill="#bfdbfe" stroke="#93c5fd" stroke-width="1.5"/>

  <!-- Roof/cabin area -->
  <rect x="200" y="240" width="750" height="238" rx="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="2"/>
  <text x="576" y="366" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#1d4ed8">Cabin / Roof Lining</text>

  <!-- Dashboard -->
  <rect x="210" y="80" width="730" height="80" rx="8" fill="#d1d5db" stroke="#6b7280" stroke-width="2"/>
  <text x="576" y="127" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" fill="#374151">Dashboard / Fascia</text>

  <!-- Steering Wheel (left side) -->
  <circle cx="290" cy="190" r="45" fill="#9ca3af" stroke="#374151" stroke-width="2.5"/>
  <circle cx="290" cy="190" r="20" fill="#6b7280" stroke="#374151" stroke-width="1.5"/>
  <text x="290" y="194" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#fff">Wheel</text>

  <!-- Front seats -->
  <rect x="210" y="165" width="170" height="140" rx="12" fill="#c4b5fd" stroke="#7c3aed" stroke-width="2"/>
  <text x="295" y="242" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#4c1d95">Front&#10;Left Seat</text>
  <rect x="770" y="165" width="170" height="140" rx="12" fill="#c4b5fd" stroke="#7c3aed" stroke-width="2"/>
  <text x="855" y="242" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#4c1d95">Front&#10;Right Seat</text>

  <!-- Centre console -->
  <rect x="400" y="165" width="350" height="140" rx="8" fill="#e9d5ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="576" y="222" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#6b21a8">Centre Console</text>
  <rect x="480" y="200" width="190" height="60" rx="6" fill="#d8b4fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="576" y="236" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#4c1d95">In-Car Entertainment</text>

  <!-- Rear seats -->
  <rect x="210" y="500" width="170" height="120" rx="12" fill="#a5f3fc" stroke="#0891b2" stroke-width="2"/>
  <text x="295" y="566" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#0e4f6b">Rear&#10;Left Seat</text>
  <rect x="490" y="500" width="170" height="120" rx="12" fill="#a5f3fc" stroke="#0891b2" stroke-width="2"/>
  <text x="576" y="566" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#0e4f6b">Rear&#10;Centre</text>
  <rect x="770" y="500" width="170" height="120" rx="12" fill="#a5f3fc" stroke="#0891b2" stroke-width="2"/>
  <text x="855" y="566" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#0e4f6b">Rear&#10;Right Seat</text>

  <!-- Boot area -->
  <rect x="200" y="640" width="750" height="15" rx="4" fill="#d1d5db" stroke="#6b7280" stroke-width="1.5"/>
  <text x="576" y="653" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#374151">Boot / Load Area</text>

  <!-- Left door panels -->
  <rect x="163" y="90" width="42" height="150" rx="6" fill="#fde68a" stroke="#d97706" stroke-width="2"/>
  <text x="184" y="172" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#92400e" transform="rotate(-90,184,172)">Front L Door</text>
  <rect x="163" y="260" width="42" height="150" rx="6" fill="#fde68a" stroke="#d97706" stroke-width="2"/>
  <text x="184" y="337" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#92400e" transform="rotate(-90,184,337)">Rear L Door</text>
  <rect x="163" y="430" width="42" height="150" rx="6" fill="#fde68a" stroke="#d97706" stroke-width="2"/>
  <text x="184" y="507" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#92400e" transform="rotate(-90,184,507)">L Side Rear</text>

  <!-- Right door panels -->
  <rect x="947" y="90" width="42" height="150" rx="6" fill="#fde68a" stroke="#d97706" stroke-width="2"/>
  <text x="968" y="172" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#92400e" transform="rotate(90,968,172)">Front R Door</text>
  <rect x="947" y="260" width="42" height="150" rx="6" fill="#fde68a" stroke="#d97706" stroke-width="2"/>
  <text x="968" y="337" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#92400e" transform="rotate(90,968,337)">Rear R Door</text>
  <rect x="947" y="430" width="42" height="150" rx="6" fill="#fde68a" stroke="#d97706" stroke-width="2"/>
  <text x="968" y="507" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#92400e" transform="rotate(90,968,507)">R Side Rear</text>

  <!-- Carpet areas -->
  <rect x="395" y="175" width="160" height="120" rx="4" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5" fill-opacity="0.6"/>
  <text x="475" y="242" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#15803d">Front&#10;Carpet</text>
  <rect x="600" y="175" width="160" height="120" rx="4" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5" fill-opacity="0.6"/>
  <text x="680" y="242" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#15803d">Rear&#10;Carpet</text>
</svg>
